version: '2.4'

services:
  the-culinary-passport:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - './src:/app/src'
      - './public:/app/public'
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_CHAT_API_URL=http://localhost:8787
      - REACT_APP_PLACES_API_URL=http://localhost:8787/places
    depends_on:
      - worker

  worker:
    build: ./worker
    command: ["node", "src/local-proxy.js"]
    ports:
      - "8787:8787"
    volumes:
      - './worker/src:/app/src'
      - './worker/.dev.vars:/app/.dev.vars'
